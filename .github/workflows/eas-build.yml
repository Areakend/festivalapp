name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile (see eas.json)
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production
      local:
        description: Build on this runner instead of EAS's cloud (free, no EAS build quota used)
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/setup-java@v4
        if: ${{ inputs.local }}
        with:
          distribution: temurin
          java-version: '17'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Runs the actual native build on this runner (credentials/keystore are
      # still fetched from EAS) instead of on EAS's build servers, so it
      # doesn't count against the EAS free-plan monthly build quota.
      - name: Build locally
        if: ${{ inputs.local }}
        run: eas build --platform android --profile ${{ inputs.profile }} --local --non-interactive --output "${{ github.workspace }}/app.apk"

      - name: Upload APK
        if: ${{ inputs.local }}
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.profile }}
          path: app.apk

      - name: Build on EAS cloud
        if: ${{ !inputs.local }}
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive --no-wait
