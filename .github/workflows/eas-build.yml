name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile (see eas.json)
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive --no-wait
