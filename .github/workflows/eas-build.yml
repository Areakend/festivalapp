name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile (see eas.json)
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production
      local:
        description: Build on this runner instead of EAS's cloud (free, no EAS build quota used)
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/setup-java@v4
        if: ${{ inputs.local }}
        with:
          distribution: temurin
          java-version: '17'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Configure Gradle memory limits
        if: ${{ inputs.local }}
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.workers.max=2" >> ~/.gradle/gradle.properties

      - name: Setup swap space
        if: ${{ inputs.local }}
        run: |
          sudo swapoff -a
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo sysctl vm.swappiness=10

      # Runs the actual native build on this runner (credentials/keystore are
      # still fetched from EAS) instead of on EAS's build servers, so it
      # doesn't count against the EAS free-plan monthly build quota.
      - name: Build locally
        if: ${{ inputs.local }}
        run: eas build --platform android --profile ${{ inputs.profile }} --local --non-interactive --output "${{ github.workspace }}/app.apk" --verbose

      - name: Upload APK
        if: ${{ inputs.local }}
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.profile }}
          path: app.apk

      # Publish as a GitHub Release so anyone (no GitHub account needed) can
      # download the APK. The stable link always serves the newest build:
      # https://github.com/Areakend/festivalapp/releases/latest/download/mainstage.apk
      - name: Publish release
        if: ${{ inputs.local && inputs.profile == 'preview' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app.apk mainstage.apk
          TAG="build-${{ github.run_number }}"
          gh release create "$TAG" mainstage.apk \
            --title "Mainstage build ${{ github.run_number }}" \
            --notes "Android APK built from ${{ github.sha }}" \
            --latest

      - name: Build on EAS cloud
        if: ${{ !inputs.local }}
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive --no-wait
